name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  gate:
    name: Build and test gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test -- --runInBand

      - name: API e2e tests
        run: npm -w apps/api run test:e2e -- --runInBand

      - name: Build
        run: npm run build

      - name: Production boot health smoke
        run: bash ./scripts/prod_boot_health_smoke.sh
